<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#0a0a0b"/>
  <rect x="40" y="40" width="432" height="432" rx="64" fill="#18181b"/>
  
  <!-- Sound wave icon -->
  <g transform="translate(256, 256)">
    <!-- Center circle -->
    <circle r="40" fill="#3b82f6"/>
    
    <!-- Inner wave -->
    <path d="M-80,0 A80,80 0 0,1 80,0" stroke="#60a5fa" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M80,0 A80,80 0 0,1 -80,0" stroke="#60a5fa" stroke-width="16" fill="none" stroke-linecap="round"/>
    
    <!-- Outer wave -->
    <path d="M-130,0 A130,130 0 0,1 130,0" stroke="#3b82f6" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M130,0 A130,130 0 0,1 -130,0" stroke="#3b82f6" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Accent glow -->
  <circle cx="256" cy="256" r="60" fill="#3b82f6" opacity="0.3" filter="blur(20px)"/>
</svg>
